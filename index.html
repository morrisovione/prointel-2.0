<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROINTEL 2.0 - Gestión de Inventario</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo">PROINTEL 2.0</div>
        <div class="header-info">
            <span id="clock-display">00:00:00</span>
            <span id="user-display">Invitado</span>
        </div>
    </header>

    <main id="app-content">
        <section id="view-landing" class="view-section">
            <div class="login-card">
                <h2>Iniciar Sesión</h2>
                <button onclick="simularLogin()">Entrar como Técnico</button>
            </div>
        </section>

        <section id="view-dashboard" class="view-section hidden">
            <div class="menu-grid">
                <button class="menu-btn" onclick="showSection('view-bodega'); cargarMiBodega();">
                    📦 MI BODEGA
                </button>
                <button class="menu-btn" onclick="alert('Módulo en desarrollo')">
                    📋 SERVICIOS
                </button>
            </div>
        </section>

        <section id="view-bodega" class="view-section hidden">
            <div class="section-header">
                <button class="btn-back" onclick="showSection('view-dashboard')">⬅ Volver</button>
                <h2>Mi Inventario Actual</h2>
            </div>

            <div class="tables-container">
                <h3>Equipos Seriados</h3>
                <table>
                    <thead><tr><th>Nombre</th><th>Código</th><th>Serie</th><th>Cant</th></tr></thead>
                    <tbody id="tabla-seriados-body"></tbody>
                </table>

                <h3>Material Misceláneo</h3>
                <table>
                    <thead><tr><th>Nombre</th><th>Código</th><th>Cant</th></tr></thead>
                    <tbody id="tabla-misc-body"></tbody>
                </table>
            </div>

            <div class="history-container">
                <h3>Historial de Entregas</h3>
                <table>
                    <thead><tr><th>Fecha</th><th>OT</th><th>Producto</th><th>Cant</th><th>Acción</th></tr></thead>
                    <tbody id="historial-entregas-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modal-factura" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('modal-factura').classList.add('hidden')">&times;</span>
            <div id="factura-detalle"></div>
            <button class="btn-print" onclick="window.print()">🖨️ Imprimir Ticket</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

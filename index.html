<!-- SECCIÓN BODEGA TÉCNICO -->
<section id="view-bodega-tecnico" class="view-section hidden">
    <div class="bodega-container">
        
        <!-- HEADER -->
        <header class="bodega-header">
            <div class="header-title">
                <span class="icon">📦</span>
                <h1>Mi Inventario Asignado</h1>
            </div>
            <p class="responsable-info">
                Responsable: <strong id="tech-name-display">—</strong>
            </p>
        </header>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="bodega-main">
            <div id="bodega-inventario">
                <!-- Se rellena con JavaScript -->
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="bodega-footer">
            <button class="btn btn-secondary" onclick="showSection('view-dashboard')">
                ← Volver al Dashboard
            </button>
            <button class="btn btn-primary" onclick="cargarBodegaTecnico()">
                🔄 Actualizar
            </button>
        </footer>

    </div>
</section>
